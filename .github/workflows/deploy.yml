name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.105.193.124
          port: 3243
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/lightvib
            git pull origin main
            npm ci
            npm run build
            cp -r public .next/standalone/
            cp -r .next/static .next/standalone/.next/
            pm2 reload lightvib || pm2 start ecosystem.config.js
