server {
    listen 80;
    server_name lightvib.com www.lightvib.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lightvib.com www.lightvib.com;

    # SSL — Let's Encrypt (run: sudo certbot --nginx -d lightvib.com -d www.lightvib.com)
    ssl_certificate     /etc/letsencrypt/live/lightvib.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lightvib.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Static files served directly by Nginx (faster, no Node.js)
    location /_next/static/ {
        alias /var/www/lightvib/.next/standalone/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        alias /var/www/lightvib/.next/standalone/public/;
        expires 7d;
    }

    # Everything else goes to Next.js on port 3010
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
